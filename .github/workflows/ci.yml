name: CI

on:
  push:
    branches: [ main, claw ]
  pull_request:

jobs:
  release-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Install dependencies
        run: npm ci
      - name: Run release test suite
        run: npm test
