name: CI

on:
  push:
    branches: [ main, claw ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run ranking smoke test
        run: node test_rank.js
