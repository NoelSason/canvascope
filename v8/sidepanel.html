<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvascope AI Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body class="cs-theme-dark">
  <div class="sidepanel-container">
    
    <!-- Top Header -->
    <header class="sidepanel-header">
      <div class="brand-row">
        <div class="logo-wrapper">
          <span class="brand-icon" aria-hidden="true">C</span>
          <span class="brand-title">Canvascope <span class="brand-sub">AI</span></span>
        </div>
        <div id="ai-status" class="ai-status-badge status-checking">
          <span class="status-dot"></span>
          <span class="status-text">Checking Local AI</span>
        </div>
      </div>
      
      <!-- Context Selector Banner -->
      <div class="context-banner">
        <div class="context-info">
          <svg class="icon-context" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
          </svg>
          <span id="active-context-label" class="context-label">Loading Course Context...</span>
        </div>
      </div>
    </header>

    <!-- Main Chat Logs -->
    <main class="chat-viewport">
      <div id="chat-history" class="chat-history">
        <!-- Initial system introduction bubble -->
        <div class="chat-bubble bubble-system animate-fade-in">
          <div class="turn-label">Canvascope</div>
          <div class="bubble-avatar"></div>
          <div class="bubble-content">
            <p class="greeting-head">Your local course assistant.</p>
            <p>I run on-device, so nothing leaves your machine. Ask me to summarize syllabus policies, analyze assignment guidelines, or extract the tasks on this page.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Suggestions Container -->
    <div id="suggestions-area" class="suggestions-area">
      <div class="suggestions-scroll">
        <button class="btn-suggest" data-prompt="Summarize the active assignment page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Summarize Assignment
        </button>
        <button class="btn-suggest" data-prompt="What are the key deadlines and tasks on this page?">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Extract Tasks
        </button>
        <button class="btn-suggest" data-prompt="Generate a 3-question conceptual quiz from this page context">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>
          Quick Practice Quiz
        </button>
        <button id="btn-lectra-send" class="btn-suggest">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Send PDF to Lectra
        </button>
        <button id="btn-seed-test" class="btn-suggest" style="border-style: dashed; opacity: 0.85;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 2v6l-5.5 9.5A2 2 0 0 0 5.2 21h13.6a2 2 0 0 0 1.7-3.5L15 8V2"/><path d="M9 2h6"/></svg>
          Seed RAG Task
        </button>
      </div>
    </div>

    <!-- Bottom Input Dock -->
    <footer class="input-dock">
      <div class="input-container">
        <textarea 
          id="user-prompt" 
          placeholder="Ask local AI about this course..." 
          rows="1"
        ></textarea>
        <button id="send-btn" class="btn-send" disabled aria-label="Send prompt">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </button>
      </div>
      <div class="footer-privacy-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="11" width="16" height="9" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
        Local-first · Chrome Prompt API
      </div>
    </footer>

  </div>

  <!-- Scripts -->
  <script src="../lib/supabase.js"></script>
  <script src="../lib/skin-themes.js"></script>
  <script src="../lib/pdf.min.js"></script>
  <script src="document-parser.js"></script>
  <script src="semantic-matcher.js"></script>
  <script src="local-ai.js"></script>
  <script src="rag-core.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
